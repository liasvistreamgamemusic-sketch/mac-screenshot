name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app

      - name: Show toolchain
        run: swift --version

      - name: Run tests
        run: swift test

      - name: Build app bundle
        run: ./scripts/build_app.sh 0.0.0-ci
